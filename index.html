<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="utf-8">
        <title>style 태그</title>
        <style> /* CSS 스타일을 작성할 수 있는 영역을 나타내는 태그 */
            h1 {
                color: white;
                background-color: black;
            }
            p {
                color: gray;
            }
        </style>
    </head>
    <body>
        <h1>style 태그</h1>
        <p>
            style 태그는 HTML 문서에서 CSS 스타일을 작성할 수 있는
            영역을 나타내는 태그입니다.
        </p>
        <h3>추가했다 이부분</h3>
    </body>
</html>
